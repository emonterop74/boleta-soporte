<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boleta de Servicio Técnico</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; font-size: 14px; }
  .page { max-width: 720px; margin: 32px auto; padding: 0 16px 48px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-circle { width: 46px; height: 46px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .company-name { font-size: 17px; font-weight: 600; color: #1d1d1f; outline: none; min-width: 120px; }
  .company-name:focus { border-bottom: 1px solid #007aff; }
  .company-sub { font-size: 12px; color: #6e6e73; outline: none; }
  .boleta-num-box { text-align: right; }
  .boleta-num-box .lbl { font-size: 11px; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.6px; }
  .boleta-num-box .num { font-size: 22px; font-weight: 600; color: #1d1d1f; }

  /* Cards */
  .card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .section-title { font-size: 12px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .section-title .icon { font-size: 15px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .full { grid-column: 1 / -1; }

  /* Fields */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #6e6e73; font-weight: 500; }
  .field input, .field select, .field textarea {
    font-family: inherit; font-size: 14px;
    background: #f5f5f7; border: 1px solid #e5e5ea;
    border-radius: 8px; padding: 8px 10px; color: #1d1d1f;
    outline: none; transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #007aff; background: #fff; }
  .field textarea { resize: vertical; min-height: 72px; }

  /* Status */
  .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .status-opt { display: none; }
  .status-label {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 10px; border: 1px solid #e5e5ea;
    border-radius: 8px; cursor: pointer; font-size: 13px;
    color: #6e6e73; transition: all 0.15s; user-select: none;
  }
  .status-opt:checked + .status-label { border-color: #007aff; background: #e8f0fe; color: #007aff; font-weight: 500; }

  /* Signature */
  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .sig-box { border: 1px dashed #c7c7cc; border-radius: 8px; height: 80px; display: flex; align-items: center; justify-content: center; color: #c7c7cc; font-size: 13px; }
  .sig-label { font-size: 11px; color: #6e6e73; margin-bottom: 6px; font-weight: 500; }

  /* Divider */
  .divider { height: 1px; background: #e5e5ea; margin: 14px 0; }

  /* Actions */
  .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 7px; border: 1px solid #e5e5ea; font-weight: 500; }
  .btn-primary { background: #007aff; color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #0066d6; }
  .btn-secondary { background: #fff; color: #1d1d1f; }
  .btn-secondary:hover { background: #f5f5f7; }
  .btn-ghost { background: transparent; color: #6e6e73; }
  .btn-ghost:hover { background: #f5f5f7; }

  /* Toast */
  .toast { margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 13px; display: none; align-items: center; gap: 8px; }
  .toast.success { background: #e6f9ec; color: #1a7f37; border: 1px solid #a7f0ba; }
  .toast.info { background: #e8f0fe; color: #007aff; border: 1px solid #c2d7ff; }

  /* Print */
  @media print {
    body { background: #fff; }
    .page { margin: 0; padding: 16px; max-width: 100%; }
    .actions, .no-print { display: none !important; }
    .card { border: 1px solid #ccc; break-inside: avoid; margin-bottom: 10px; }
    .field input, .field select, .field textarea { background: transparent; border: none; border-bottom: 1px solid #ccc; border-radius: 0; padding: 4px 0; }
    .status-opt:checked + .status-label { border-color: #007aff; background: #e8f0fe; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-circle">🔧</div>
      <div>
        <div class="company-name" contenteditable="true" id="company-name">Soporte Winsermant-LSSF</div>
        <div class="company-sub" contenteditable="true">Servicio y Reparación</div>
      </div>
    </div>

  </div>

  <!-- Información general -->
  <div class="card">
    <div class="section-title"><span class="icon">📅</span> Información general</div>
    <div class="grid-3">
      <div class="field">
        <label>Fecha de ingreso</label>
        <input type="date" id="fecha-ingreso">
      </div>
      <div class="field">
        <label>Fecha de entrega</label>
        <input type="date" id="fecha-entrega">
      </div>
      <div class="field">
        <label>Técnico asignado</label>
        <input type="text" id="tecnico" placeholder="Nombre del técnico">
      </div>
    </div>
  </div>

  <!-- Datos del cliente -->
  <div class="card">
    <div class="section-title"><span class="icon">👤</span> Datos del cliente</div>
    <div class="grid-2">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="cliente-nombre" placeholder="Nombre y apellidos">
      </div>
      <div class="field">
        <label>Departamento</label>
        <input type="text" id="cliente-depto" placeholder="Departamento o área">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="cliente-tel" placeholder="+506 8888-8888">
      </div>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="cliente-email" placeholder="correo@ejemplo.com">
      </div>
    </div>
  </div>

  <!-- Equipo -->
  <div class="card">
    <div class="section-title"><span class="icon">💻</span> Equipo / Dispositivo</div>
    <div class="grid-3">
      <div class="field">
        <label>Tipo de equipo</label>
        <select id="equipo-tipo">
          <option value="">Seleccionar...</option>
          <option>Computadora de escritorio</option>
          <option>Laptop</option>
          <option>Tablet</option>
          <option>Celular</option>
          <option>Impresora</option>
          <option>Televisor</option>
          <option>Consola de videojuegos</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Marca</label>
        <input type="text" id="equipo-marca" placeholder="Dell, HP, Apple...">
      </div>
      <div class="field">
        <label>Modelo</label>
        <input type="text" id="equipo-modelo" placeholder="Modelo del equipo">
      </div>
      <div class="field">
        <label>N° de serie</label>
        <input type="text" id="equipo-serie" placeholder="Serial del equipo">
      </div>
      <div class="field">
        <label>Color</label>
        <input type="text" id="equipo-color" placeholder="Negro, plateado...">
      </div>
      <div class="field">
        <label>Accesorios incluidos</label>
        <input type="text" id="equipo-accesorios" placeholder="Cargador, funda...">
      </div>
      <div class="field full">
        <label>Falla reportada por el cliente</label>
        <textarea id="falla-cliente" placeholder="Describa la falla que reportó el cliente..."></textarea>
      </div>

    </div>
  </div>





  <!-- Acciones -->
  <div class="actions">
    <button class="btn btn-primary" onclick="enviarCorreo()">📧 Enviar por correo</button>
    <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="btn btn-ghost" onclick="limpiar()">🔄 Nueva boleta</button>
  </div>
  <div class="toast" id="toast"></div>

</div>

<script>
  // Fecha de hoy
  document.getElementById('fecha-ingreso').value = new Date().toISOString().split('T')[0];


  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'flex';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  function enviarCorreo() {
    const empresa = document.getElementById('company-name').textContent.trim();
    const fechaIngreso = document.getElementById('fecha-ingreso').value;
    const fechaEntrega = document.getElementById('fecha-entrega').value;
    const tecnico = document.getElementById('tecnico').value;
    const nombre = document.getElementById('cliente-nombre').value;
    const depto = document.getElementById('cliente-depto').value;
    const tel = document.getElementById('cliente-tel').value;
    const email = document.getElementById('cliente-email').value;
    const tipo = document.getElementById('equipo-tipo').value;
    const marca = document.getElementById('equipo-marca').value;
    const modelo = document.getElementById('equipo-modelo').value;
    const serie = document.getElementById('equipo-serie').value;
    const color = document.getElementById('equipo-color').value;
    const accesorios = document.getElementById('equipo-accesorios').value;
    const falla = document.getElementById('falla-cliente').value;

    if (!email) { showToast('⚠️ Ingrese el correo del cliente antes de enviar.', 'info'); return; }

    const body = encodeURIComponent(
`Estimado/a ${nombre || 'cliente'},

Le enviamos el detalle de su servicio técnico.

━━━━━━━━━━━━━━━━━━━━━━━━━
INFORMACIÓN DEL SERVICIO
━━━━━━━━━━━━━━━━━━━━━━━━━
Empresa: ${empresa}
Técnico: ${tecnico}
Fecha de ingreso: ${fechaIngreso}
Fecha de entrega: ${fechaEntrega}

━━━━━━━━━━━━━━━━━━━━━━━━━
CLIENTE
━━━━━━━━━━━━━━━━━━━━━━━━━
Nombre: ${nombre}
Departamento: ${depto}
Teléfono: ${tel}

━━━━━━━━━━━━━━━━━━━━━━━━━
EQUIPO
━━━━━━━━━━━━━━━━━━━━━━━━━
Tipo: ${tipo}
Marca: ${marca}
Modelo: ${modelo}
N° de serie: ${serie}
Color: ${color}
Accesorios: ${accesorios}
Falla reportada: ${falla}

Gracias por confiar en ${empresa}.
`);

    const subject = encodeURIComponent(`Servicio Técnico - ${empresa}`);
    window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_self');
    showToast('✅ Abriendo cliente de correo...', 'success');
  }

  function limpiar() {
    if (!confirm('¿Desea limpiar el formulario para una nueva boleta?')) return;
    document.querySelectorAll('input[type=text], input[type=tel], input[type=email], textarea').forEach(el => el.value = '');
    document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
    document.getElementById('fecha-ingreso').value = new Date().toISOString().split('T')[0];
    document.getElementById('fecha-entrega').value = '';
  }
</script>
</body>
</html>
